<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0f16">
<title>Road Map поездки</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="bg" aria-hidden="true"></div>

<button id="menu-btn" type="button" aria-label="Меню"><span></span><span></span><span></span></button>
<div id="menu-overlay" hidden>
  <nav class="menu" aria-label="Главное меню">
    <button class="menu-item" type="button" data-act="settings">Настройки</button>
    <button class="menu-item" type="button" data-act="map">Карта событий</button>
    <button class="menu-item" type="button" data-act="reset">Сброс</button>
    <button class="menu-item" type="button" data-act="import">Импорт</button>
    <button class="menu-item" type="button" data-act="export">Экспорт</button>
  </nav>
</div>

<input type="file" id="import-file" accept=".json,application/json" hidden>
<input type="file" id="stop-photo-file" accept="image/*" hidden>

<header class="topbar">
  <p class="eyebrow mono"><span id="eyebrow1" class="editable"></span><span class="sep"> · </span><span id="eyebrow2" class="editable"></span></p>
  <h1 id="page-title" class="editable"></h1>
  <p id="dates" class="dates mono editable"></p>
  <p id="subtitle" class="subtitle editable"></p>
</header>

<main>
  <section class="section" id="schedule">
    <div id="day-tabs" class="day-tabs"></div>
    <div id="day-head"></div>
    <div id="stops"></div>
    <button id="add-stop" class="pill edit-only" type="button">＋ Добавить событие</button>
  </section>

  <section class="section" id="map-section">
    <h2 class="section-title">Точки на карте</h2>
    <div id="map"></div>
    <div id="chips" class="chips"></div>
    <div id="points-editor" class="edit-only"></div>
  </section>

  <section class="section">
    <h2 class="section-title">Бюджет</h2>
    <div class="card">
      <div class="table-wrap">
        <table class="budget">
          <thead>
            <tr><th>Событие</th><th>Категория</th><th class="num">Сумма</th><th>Валюта</th><th class="del-col"></th></tr>
          </thead>
          <tbody id="budget-body"></tbody>
        </table>
      </div>
      <button id="add-row" class="pill edit-only" type="button">＋ Добавить строку</button>
      <div id="cat-editor" class="edit-only"></div>
      <p class="rate mono">Курс: 1 BYN = <span id="rate" class="editable"></span> RUB</p>
      <div class="totals mono">
        <div id="total-rub" class="total-main"></div>
        <div id="total-byn" class="total-sub"></div>
      </div>
    </div>
  </section>

  <section class="section" id="settings-section" hidden>
    <h2 class="section-title">Настройки · Фон города</h2>
    <div class="card bg-panel">
      <input type="url" id="bg-url" placeholder="https://… прямая ссылка на изображение">
      <button id="bg-apply-url" class="pill" type="button">Применить URL</button>
      <button id="bg-upload" class="pill" type="button">Загрузить файл</button>
      <button id="bg-default" class="pill" type="button">Убрать фон</button>
      <input type="file" id="bg-file" accept="image/*" hidden>
    </div>
  </section>
</main>

<button id="edit-fab" class="fab" type="button">✎ Править</button>
<div id="edit-banner" class="edit-only" role="status">Режим редактирования: кликните на любой текст, чтобы изменить · кликните по карте, чтобы добавить точку</div>

<script src="app.js"></script>
</body>
</html>
